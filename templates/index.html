<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hausa to English Transcriber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="{{ url_for('static', filename='scripts.js') }}" defer></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl p-6">
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">Voice Transcriber</h1>

        <!-- Language Selectors -->
        <div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-6">
            <div class="w-full">
                <label class="block text-sm font-medium text-gray-700 mb-1">Spoken Language</label>
                <select id="sourceLang" class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500">
                    <option value="ha">Hausa</option>
                    <option value="ig">Igbo</option>
                    <option value="yo">Yoruba</option>
                    <option value="en">English</option>
                </select>
            </div>

            <div class="hidden md:block text-gray-400 mt-5">➔</div>

            <div class="w-full">
                <label class="block text-sm font-medium text-gray-700 mb-1">Translate To</label>
                <select id="targetLang" class="w-full border-gray-300 rounded-lg p-2 border focus:ring-blue-500">
                    <option value="en">English</option>
                    <option value="fr">French</option>
                    <option value="ar">Arabic</option>
                </select>
            </div>
        </div>

        <!-- Record Button -->
        <div class="flex flex-col items-center mb-4">
            <button id="recordBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-full shadow-md transition-all flex items-center gap-2">
                <span id="btnIcon">🎤</span>
                <span id="btnText">Start Recording</span>
            </button>
        </div>

        <!-- Live Audio Visualizer (hidden until recording starts) -->
        <div class="flex justify-center mb-6">
            <canvas id="visualizer" width="500" height="60" class="w-full max-w-md rounded-lg bg-gray-900 hidden"></canvas>
        </div>

        <!-- Divider -->
        <div class="flex items-center gap-3 mb-6">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-gray-400 text-sm">OR</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- File Upload Section -->
        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">Upload an Audio File</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="file" id="audioFileInput" accept="audio/*"
                    class="w-full text-sm text-gray-600 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none p-2">
                <button id="uploadBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-lg whitespace-nowrap">
                    Transcribe File
                </button>
            </div>
            <p id="fileNameDisplay" class="text-xs text-gray-500 mt-1"></p>
        </div>

        <!-- Output Areas -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Original Text (Transcription)</label>
                <textarea id="transcriptionOutput" rows="3" class="w-full border-gray-300 rounded-lg p-3 bg-gray-50 border" readonly placeholder="Waiting for audio..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Translation</label>
                <textarea id="translationOutput" rows="3" class="w-full border-gray-300 rounded-lg p-3 bg-blue-50 border text-blue-900 font-medium" readonly placeholder="Translation will appear here..."></textarea>
            </div>
        </div>
    </div>

</body>
</html>
